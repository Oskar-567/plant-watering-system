name: Server CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'server/**'

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: m2-${{ runner.os }}-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-

      - name: Run tests
        working-directory: server
        run: ./mvnw test --no-transfer-progress
        # TODO: When Testcontainers integration tests are added, create
        # server/src/test/resources/application-ci.properties with a 'ci' Spring profile.
        # Testcontainers manages its own PostgreSQL/InfluxDB containers — no extra
        # workflow steps are needed; Docker is available on ubuntu-latest runners.
