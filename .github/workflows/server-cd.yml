name: Server CD

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: m2-${{ runner.os }}-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short commit SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: server
        run: |
          ./mvnw spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=ghcr.io/oskar-567/plant-watering-system-server:latest

      - name: Tag with commit SHA
        run: |
          docker tag \
            ghcr.io/oskar-567/plant-watering-system-server:latest \
            ghcr.io/oskar-567/plant-watering-system-server:sha-${{ steps.sha.outputs.short }}

      - name: Push both tags
        run: |
          docker push ghcr.io/oskar-567/plant-watering-system-server:latest
          docker push ghcr.io/oskar-567/plant-watering-system-server:sha-${{ steps.sha.outputs.short }}
