name: Server CD

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: m2-${{ runner.os }}-${{ hashFiles('server/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-

      - name: Run tests
        working-directory: server
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Build JAR
        working-directory: server
        run: ./mvnw package -DskipTests

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short commit SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: server
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/oskar-567/plant-watering-system-server:latest
            ghcr.io/oskar-567/plant-watering-system-server:sha-${{ steps.sha.outputs.short }}

  deploy:
    name: Update Image Tag in k3s-homelab
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Clone k3s-homelab and update image tag
        env:
          PAT: ${{ secrets.K3S_HOMELAB_PAT }}
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          git clone https://x-access-token:${PAT}@github.com/Oskar-567/k3s-homelab.git
          cd k3s-homelab
          sed -i "s|image: ghcr.io/oskar-567/plant-watering-system-server:sha-.*|image: ghcr.io/oskar-567/plant-watering-system-server:sha-${SHORT_SHA}|" \
            infra/apps/plant-watering-system-server/deployment.yaml
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          git add infra/apps/plant-watering-system-server/deployment.yaml
          git commit -m "chore: update server image to sha-${SHORT_SHA}"
          git push
