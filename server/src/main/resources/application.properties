spring.application.name=plant-watering-server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/plantdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# InfluxDB
influx.url=${INFLUX_URL}
influx.token=${INFLUX_TOKEN}
influx.org=${INFLUX_ORG}
influx.bucket=${INFLUX_BUCKET}

# JWT — 30-day expiry
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=2592000000

# Single-user auth
app.password=${APP_PASSWORD}

# MQTT
mqtt.broker=${MQTT_BROKER}
mqtt.port=${MQTT_PORT:1883}
mqtt.client-id=plant-server
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.enabled=${MQTT_ENABLED:true}

# SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
